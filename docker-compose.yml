services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    healthcheck:
      test: pg_isready -h localhost -U $$POSTGRES_USER
      interval: 2s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - ./logs/redis:/var/log/redis
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: prefecthq/prefect:3-latest
    env_file:
      - .env
    # No restart policy here, since it runs once and finishes successfully
    depends_on:
      postgres:
        condition: service_healthy
    command: prefect server database upgrade -y
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_API_AUTH_STRING: "${PREFECT_API_AUTH_STRING:-admin:pass}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prefect-api:
    image: prefecthq/prefect:3-latest
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs/prefect-api:/var/log/prefect-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1.5G
    command: prefect server start --host 0.0.0.0 --no-services
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_API_DATABASE_MIGRATE_ON_START: "false"
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_SERVER_EVENTS_CAUSAL_ORDERING: prefect_redis.ordering
      PREFECT_SERVER_CONCURRENCY_LEASE_STORAGE: prefect_redis.lease_storage
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: "6379"
      PREFECT_SERVER_API_AUTH_STRING: "${PREFECT_SERVER_API_AUTH_STRING:-admin:pass}"
      PREFECT_UI_API_URL: "${PREFECT_UI_API_URL:-http://localhost:4200/api}"
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prefect-background:
    image: prefecthq/prefect:3-latest
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs/prefect-background:/var/log/prefect-background
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1.5G
    command: prefect server services start
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_API_DATABASE_MIGRATE_ON_START: "false"
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_SERVER_EVENTS_CAUSAL_ORDERING: prefect_redis.ordering
      PREFECT_SERVER_CONCURRENCY_LEASE_STORAGE: prefect_redis.lease_storage
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: "6379"
      PREFECT_SERVER_API_AUTH_STRING: "${PREFECT_SERVER_API_AUTH_STRING:-admin:pass}"
      PREFECT_UI_API_URL: "${PREFECT_UI_API_URL:-http://localhost:4200/api}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  jobhunter-worker-local:
    image: ghcr.io/bhroben/jobhunter_backend:main
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs/jobhunter-worker:/var/log/jobhunter-worker
    depends_on:
      prefect-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      PREFECT_API_URL: http://prefect-api:4200/api
    command: prefect worker start --pool local-pool
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Allows tracking Docker container status natively
    ports:
      - "3001:3001"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uptime_kuma_data: